<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönetim | Doğa Temizlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="p-4 md:p-10 min-h-screen">
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
        
        <!-- EKLEME FORMU -->
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl h-fit">
            <h2 class="text-2xl font-black mb-8"><i class="fa-solid fa-plus text-green-600 mr-2"></i> Yeni Ürün</h2>
            <form id="pForm" class="space-y-5">
                <input type="text" id="name" placeholder="Ürün Adı" required class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-green-500 transition">
                <input type="number" id="price" placeholder="Fiyat" required class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-green-500 transition">
                <input type="file" id="image" accept="image/*" required class="w-full text-xs">
                <textarea id="desc" placeholder="Açıklama" required class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-green-500 transition h-24"></textarea>
                <button type="submit" id="sBtn" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-green-600 transition shadow-xl">MAĞAZAYA EKLE</button>
            </form>
            <div id="stat" class="mt-4 text-center font-bold text-xs"></div>
        </div>

        <!-- YÖNETİM LİSTESİ -->
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-2xl font-black mb-8 flex justify-between">
                <span><i class="fa-solid fa-boxes-stacked text-green-600 mr-2"></i> Envanter</span>
                <a href="index.html" class="text-slate-400 text-sm"><i class="fa-solid fa-house"></i></a>
            </h2>
            <div id="admin-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://temizlik-api-production.up.railway.app/api/urunler";
        const I_KEY = "d74a98b6d9d64daa9724810335c54556";

        window.onload = () => { if(prompt("Şifre:") !== "admin123") window.location.href="index.html"; loadAdmin(); };

        async function loadAdmin() {
            const list = document.getElementById('admin-list');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                list.innerHTML = "";
                data.forEach(p => {
                    list.innerHTML += `
                        <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <div class="flex items-center gap-4">
                                <img src="${p.resimUrl}" class="w-12 h-12 rounded-xl object-cover">
                                <div><h4 class="font-bold text-sm">${p.isim}</h4><p class="text-xs text-green-600">${p.fiyat} TL</p></div>
                            </div>
                            <button onclick="del('${p._id}')" class="text-red-500 hover:text-red-700 transition px-3"><i class="fa-solid fa-trash"></i></button>
                        </div>`;
                });
            } catch (err) { list.innerHTML = "Bağlantı hatası!"; }
        }

        async function del(id) {
            if(!confirm("Emin misiniz?")) return;
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            loadAdmin();
        }

        document.getElementById('pForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sBtn');
            const stat = document.getElementById('stat');
            btn.disabled = true; btn.innerText = "YÜKLENİYOR...";

            try {
                const iF = document.getElementById('image').files[0];
                const fd = new FormData(); fd.append('image', iF);
                const iRes = await fetch(`https://api.imgbb.com/1/upload?key=${I_KEY}`, { method: 'POST', body: fd });
                const iD = await iRes.json();
                
                const p = {
                    isim: document.getElementById('name').value,
                    fiyat: document.getElementById('price').value,
                    aciklama: document.getElementById('desc').value,
                    resimUrl: iD.data.url
                };

                const aRes = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(p)
                });

                if(aRes.ok) {
                    stat.innerText = "✓ Ürün başarıyla eklendi!";
                    document.getElementById('pForm').reset();
                    loadAdmin();
                }
            } catch (err) { stat.innerText = "Hata oluştu!"; } finally { btn.disabled = false; btn.innerText = "MAĞAZAYA EKLE"; }
        });
    </script>
</body>
</html>
