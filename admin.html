<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Panel | Doğa Temizlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; }</style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-10">
        
        <!-- ÜRÜN EKLEME FORMU -->
        <div class="lg:col-span-1 bg-white rounded-[3rem] p-10 shadow-2xl h-fit sticky top-10">
            <h2 class="text-2xl font-black text-slate-800 mb-8 flex items-center gap-3">
                <i class="fa-solid fa-plus-circle text-green-600"></i> Yeni Ürün
            </h2>
            
            <form id="productForm" class="space-y-6">
                <div>
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2 block font-semibold">Ürün Adı</label>
                    <input type="text" id="name" required class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl p-4 outline-none focus:border-green-500 transition font-bold">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2 block font-semibold font-semibold">Fiyat</label>
                        <input type="number" id="price" required class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl p-4 outline-none focus:border-green-500 transition font-bold">
                    </div>
                    <div>
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2 block font-semibold font-semibold">Görsel</label>
                        <input type="file" id="image" accept="image/*" required class="hidden">
                        <label for="image" class="w-full bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl p-4 flex items-center justify-center cursor-pointer hover:bg-green-50 transition text-slate-400 font-bold text-xs uppercase">Seç</label>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2 block font-semibold">Açıklama</label>
                    <textarea id="desc" rows="3" required class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl p-4 outline-none focus:border-green-500 transition resize-none text-sm"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl hover:bg-green-600 transition shadow-xl tracking-widest">ÜRÜNÜ EKLE</button>
            </form>
            <div id="status" class="mt-4 text-center text-xs font-bold hidden p-3 rounded-xl"></div>
        </div>

        <!-- ÜRÜN YÖNETİM LİSTESİ -->
        <div class="lg:col-span-2 bg-white rounded-[3rem] p-10 shadow-2xl">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black text-slate-800 flex items-center gap-3">
                    <i class="fa-solid fa-boxes-stacked text-green-600"></i> Mağaza Stoğu
                </h2>
                <a href="index.html" class="text-slate-400 hover:text-green-600 transition text-2xl"><i class="fa-solid fa-circle-left"></i></a>
            </div>
            
            <div id="admin-product-list" class="grid grid-cols-1 gap-4">
                <p class="text-slate-400 italic animate-pulse">Ürünler çekiliyor...</p>
            </div>
        </div>

    </div>

    <script>
        const IMGBB_KEY = "d74a98b6d9d64daa9724810335c54556"; 
        const API_URL = "https://temizlik-api.onrender.com/api/urunler";

        window.onload = () => {
            const pass = prompt("Sistem Şifresi:");
            if(pass !== "admin123") window.location.href = "index.html";
            loadAdminProducts();
        };

        // Ürünleri Listeleme (MongoDB _id'ye göre)
        async function loadAdminProducts() {
            const list = document.getElementById('admin-product-list');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                list.innerHTML = "";

                if(data.length === 0) {
                    list.innerHTML = "<p class='text-slate-400 italic py-10 text-center border-2 border-dashed border-slate-50 rounded-[2rem]'>Henüz ürün eklenmemiş.</p>";
                    return;
                }

                data.forEach(p => {
                    list.innerHTML += `
                        <div class="flex items-center justify-between p-5 bg-slate-50 rounded-[2rem] hover:bg-white hover:shadow-xl hover:scale-[1.02] transition duration-300 group border border-transparent hover:border-slate-100">
                            <div class="flex items-center gap-5">
                                <img src="${p.resimUrl}" class="w-16 h-16 rounded-2xl object-cover shadow-sm">
                                <div>
                                    <h4 class="font-bold text-slate-800 text-lg">${p.isim}</h4>
                                    <p class="text-sm font-black text-green-600 italic">${p.fiyat} TL</p>
                                </div>
                            </div>
                            <button onclick="deleteProduct('${p._id}')" class="w-12 h-12 bg-red-50 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition-all shadow-sm">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>`;
                });
            } catch (err) {
                list.innerHTML = "Hata: API'ye ulaşılamıyor.";
            }
        }

        // Ürün Silme (MongoDB _id kullanarak)
        async function deleteProduct(id) {
            if(!confirm("Bu ürün kalıcı olarak silinecek. Onaylıyor musunuz?")) return;
            try {
                const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if(res.ok) {
                    alert("Ürün MongoDB'den silindi!");
                    loadAdminProducts();
                }
            } catch (err) {
                alert("Silme hatası!");
            }
        }

        // Ürün Ekleme
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            btn.disabled = true; btn.innerText = "YÜKLENİYOR...";
            status.className = "mt-4 text-center text-xs font-bold block p-3 rounded-xl bg-blue-50 text-blue-600";
            status.innerText = "Fotoğraf buluta aktarılıyor...";

            try {
                const imgFile = document.getElementById('image').files[0];
                const fd = new FormData(); fd.append('image', imgFile);
                const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
                const imgData = await imgRes.json();
                
                const payload = {
                    isim: document.getElementById('name').value,
                    fiyat: document.getElementById('price').value,
                    aciklama: document.getElementById('desc').value,
                    resimUrl: imgData.data.url
                };

                const apiRes = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if(apiRes.ok) {
                    status.className = "mt-4 text-center text-xs font-bold block p-3 rounded-xl bg-green-50 text-green-700";
                    status.innerText = "BAŞARILI! Ürün MongoDB'ye kaydedildi.";
                    document.getElementById('productForm').reset();
                    loadAdminProducts();
                }
            } catch (err) {
                status.innerText = "HATA!";
            } finally {
                btn.disabled = false; btn.innerText = "ÜRÜNÜ EKLE";
            }
        });
    </script>
</body>
</html>
