<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönetici Paneli | Doğa Temizlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#0f172a] min-h-screen p-6">

    <div class="max-w-5xl mx-auto space-y-10">
        
        <!-- ÜRÜN EKLEME FORMU -->
        <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row">
            <div class="bg-green-600 md:w-1/3 p-12 text-white flex flex-col justify-between">
                <div>
                    <h2 class="text-3xl font-bold">Ürün Ekle</h2>
                    <p class="mt-4 opacity-80 text-sm">Yeni ürünleri buradan mağazaya dahil edin.</p>
                </div>
                <a href="index.html" class="inline-block mt-8 font-bold hover:underline"><i class="fa-solid fa-arrow-left mr-2"></i> Siteye Dön</a>
            </div>

            <div class="md:w-2/3 p-12">
                <form id="productForm" class="space-y-6">
                    <input type="text" id="name" required placeholder="Ürün Adı" class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl p-4 outline-none focus:border-green-500 transition font-semibold">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="price" required placeholder="Fiyat (TL)" class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl p-4 outline-none focus:border-green-500 transition font-bold">
                        <input type="file" id="image" accept="image/*" required class="hidden">
                        <label for="image" id="fileLabel" class="w-full bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl p-4 flex items-center justify-center cursor-pointer hover:bg-green-50 transition text-slate-500 font-bold text-sm text-center">
                           Fotoğraf Seç
                        </label>
                    </div>
                    <textarea id="desc" rows="2" required placeholder="Kısa Açıklama" class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl p-4 outline-none focus:border-green-500 transition"></textarea>
                    <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-extrabold py-5 rounded-2xl hover:bg-green-600 transition-all shadow-xl">ÜRÜNÜ YAYINA AL</button>
                </form>
                <div id="status" class="mt-4 text-center text-sm font-bold hidden p-3 rounded-xl"></div>
            </div>
        </div>

        <!-- ÜRÜN SİLME LİSTESİ (YENİ) -->
        <div class="bg-white rounded-[3rem] shadow-2xl p-10">
            <h3 class="text-2xl font-extrabold text-slate-800 mb-8 flex items-center gap-3">
                <i class="fa-solid fa-list-check text-green-600"></i> Mevcut Ürünler
            </h3>
            
            <div id="admin-product-list" class="space-y-4">
                <!-- Ürünler buraya yüklenecek -->
                <p class="text-slate-400 animate-pulse">Ürünler listeleniyor...</p>
            </div>
        </div>

    </div>

    <script>
        const IMGBB_KEY = "d74a98b6d9d64daa9724810335c54556"; 
        const API_URL = "https://temizlik-api.onrender.com/api/urunler";

        // Admin Şifresi
        window.onload = () => {
            const pass = prompt("Şifre:");
            if(pass !== "admin123") window.location.href = "index.html";
            loadAdminProducts(); // Ürünleri listele
        };

        // ÜRÜNLERİ LİSTELEME FONKSİYONU
        async function loadAdminProducts() {
            const list = document.getElementById('admin-product-list');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                list.innerHTML = "";

                if(data.length === 0) {
                    list.innerHTML = "<p class='text-slate-400 italic'>Mağazada hiç ürün yok.</p>";
                    return;
                }

                data.forEach(p => {
                    list.innerHTML += `
                        <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <div class="flex items-center gap-4">
                                <img src="${p.resimUrl}" class="w-12 h-12 rounded-lg object-cover">
                                <div>
                                    <h4 class="font-bold text-slate-800">${p.isim}</h4>
                                    <p class="text-xs text-slate-400">${p.fiyat} TL</p>
                                </div>
                            </div>
                            <button onclick="deleteProduct('${p.id}')" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl hover:bg-red-500 hover:text-white transition font-bold text-xs uppercase tracking-wider">
                                <i class="fa-solid fa-trash-can mr-1"></i> Sil
                            </button>
                        </div>
                    `;
                });
            } catch (err) {
                list.innerHTML = "Ürünler yüklenemedi.";
            }
        }

        // ÜRÜN SİLME FONKSİYONU
        async function deleteProduct(id) {
            if(!confirm("Bu ürünü silmek istediğinize emin misiniz?")) return;

            try {
                const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if(res.ok) {
                    alert("Ürün başarıyla silindi!");
                    loadAdminProducts(); // Listeyi güncelle
                }
            } catch (err) {
                alert("Silme işlemi sırasında hata oluştu.");
            }
        }

        // ÜRÜN EKLEME (ESKİ KODUN AYNISI)
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            btn.disabled = true; btn.innerText = "YÜKLENİYOR...";

            try {
                const imgFile = document.getElementById('image').files[0];
                const fd = new FormData(); fd.append('image', imgFile);
                const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
                const imgData = await imgRes.json();
                
                const payload = {
                    isim: document.getElementById('name').value,
                    fiyat: document.getElementById('price').value,
                    aciklama: document.getElementById('desc').value,
                    resimUrl: imgData.data.url
                };

                const apiRes = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if(apiRes.ok) {
                    status.className = "mt-4 text-center text-sm font-bold p-3 rounded-xl bg-green-50 text-green-700 block";
                    status.innerText = "Ürün başarıyla eklendi!";
                    document.getElementById('productForm').reset();
                    loadAdminProducts(); // Listeyi güncelle
                }
            } catch (err) {
                status.innerText = "Hata oluştu!";
            } finally {
                btn.disabled = false; btn.innerText = "ÜRÜNÜ YAYINA AL";
            }
        });
    </script>
</body>
</html>
