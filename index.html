<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğa Temizlik | Saf ve Doğal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfdfa; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 px-6 h-20 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-leaf text-green-600 text-3xl"></i>
            <span class="text-2xl font-black text-slate-800 tracking-tight">Doğa<span class="text-green-600">Temizlik</span></span>
        </div>
        <a href="admin.html" class="bg-slate-900 text-white px-6 py-2.5 rounded-full text-xs font-bold hover:bg-green-600 transition">Yönetici Paneli</a>
    </nav>

    <header class="pt-44 pb-20 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold text-slate-900 mb-6">Doğanın Gücü <br><span class="text-green-600 italic">Evinizde.</span></h1>
        <p class="text-slate-500 max-w-xl mx-auto mb-10">Railway ve MongoDB altyapısı ile asla kaybolmayan ürün listesi.</p>
        <a href="#urunler" class="bg-green-600 text-white px-10 py-4 rounded-3xl font-bold hover:bg-slate-900 transition shadow-xl shadow-green-100">Koleksiyonu Gör</a>
    </header>

    <section id="urunler" class="max-w-7xl mx-auto py-20 px-6">
        <div id="loading" class="text-center py-10">
            <div class="animate-spin inline-block w-10 h-10 border-4 border-green-600 border-t-transparent rounded-full"></div>
            <p class="mt-4 text-slate-400 font-bold italic">Ürünler yükleniyor...</p>
        </div>
        <div id="products-container" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
    </section>

    <script>
        const API_URL = "https://temizlik-api-production.up.railway.app/api/urunler";

        async function load() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const container = document.getElementById('products-container');
                document.getElementById('loading').style.display = 'none';

                if (data.length === 0) {
                    container.innerHTML = "<p class='col-span-full text-center text-slate-400 italic py-20'>Henüz ürün eklenmemiş.</p>";
                    return;
                }

                data.forEach(p => {
                    container.innerHTML += `
                        <div class="product-card bg-white rounded-[2.5rem] overflow-hidden transition-all duration-500 border border-slate-50">
                            <img src="${p.resimUrl}" class="w-full h-72 object-cover">
                            <div class="p-8">
                                <h3 class="text-2xl font-bold mb-2">${p.isim}</h3>
                                <p class="text-slate-500 text-sm mb-6 line-clamp-2 italic">"${p.aciklama}"</p>
                                <div class="flex justify-between items-center">
                                    <span class="text-3xl font-black">${p.fiyat} <small class="text-sm font-normal">TL</small></span>
                                    <button class="bg-green-600 text-white w-12 h-12 rounded-2xl hover:bg-slate-900 transition shadow-lg"><i class="fa-solid fa-plus"></i></button>
                                </div>
                            </div>
                        </div>`;
                });
            } catch (err) {
                document.getElementById('loading').innerHTML = "<p class='text-red-500'>Bağlantı hatası! Lütfen Railway linkini kontrol edin.</p>";
            }
        }
        window.onload = load;
    </script>
</body>
</html>
